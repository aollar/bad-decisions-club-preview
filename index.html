<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bad Decisions Club - Interactive Scene</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        min-height: 100%;
        background: #000;
        overflow: hidden;
      }

      body {
        display: grid;
        place-items: center;
      }

      .scene {
        position: relative;
        width: min(100vw, calc(100vh * 16 / 9));
        aspect-ratio: 16 / 9;
        overflow: hidden;
        background: #000;
      }

      .scene-video {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .menu-frame {
        position: absolute;
        left: 70.3125%;
        top: -0.694444%;
        width: 29.609375%;
        height: 101.25%;
        border: 0;
        background: transparent;
        z-index: 2;
      }

      @media (max-aspect-ratio: 16 / 9) {
        .scene {
          width: 100vw;
        }
      }
    </style>
  </head>
  <body>
    <main class="scene" aria-label="Bad Decisions Club interactive scene">
      <video
        class="scene-video"
        src="bdc_scene.mp4"
        autoplay
        loop
        muted
        playsinline
      ></video>
      <iframe
        class="menu-frame"
        src="bdc-menu/index.html?embed=1&v=3"
        title="Choose Your Bad Decision"
        allowtransparency="true"
      ></iframe>
    </main>
  </body>
</html>
